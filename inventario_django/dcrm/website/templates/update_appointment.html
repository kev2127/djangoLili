{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="mb-4">Actualizar Cita</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Paciente / Registro</label>
                            {{ form.record }}
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha</label>
                            {{ form.fecha }}
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Hora</label>
                            {{ form.hora }}
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Descripción</label>
                            {{ form.descripcion }}
                        </div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button type="submit" class="btn btn-warning">Actualizar Cita</button>
                        <a href="{% url 'agenda' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
